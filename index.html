<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDKU spring-26 — social views</title>
<style>
  :root {
    --page: #f9f9f7;
    --surface: #fcfcfb;
    --ink: #0b0b0b;
    --ink-2: #52514e;
    --muted: #898781;
    --grid: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11, 11, 11, 0.10);
    --series: #2a78d6;
    --series-soft: #b7d3f6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page: #0d0d0d;
      --surface: #1a1a19;
      --ink: #ffffff;
      --ink-2: #c3c2b7;
      --muted: #898781;
      --grid: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255, 255, 255, 0.10);
      --series: #3987e5;
      --series-soft: #1c5cab;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--page);
    color: var(--ink);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 24px;
  }
  .wrap { max-width: 920px; margin: 0 auto; }
  header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  h1 { font-size: 18px; font-weight: 650; }
  .updated { color: var(--muted); font-size: 12px; }
  .updated .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #0ca30c; margin-right: 5px; }

  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .tile { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .tile .label { color: var(--ink-2); font-size: 12px; margin-bottom: 4px; }
  .tile .value { font-size: 26px; font-weight: 600; }
  .tile .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 20px; }
  .card h2 { font-size: 13px; font-weight: 600; color: var(--ink-2); margin-bottom: 12px; }

  .plat-row { display: grid; grid-template-columns: 90px 1fr 90px 110px; align-items: center; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--grid); }
  .plat-row:last-child { border-bottom: 0; }
  .plat-name { font-weight: 550; font-size: 13px; }
  .plat-bar { height: 12px; background: var(--series); border-radius: 0 4px 4px 0; min-width: 2px; }
  .plat-views { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  .plat-sub { color: var(--muted); font-size: 12px; text-align: right; }

  .notice { color: var(--ink-2); font-size: 12.5px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--grid); display: flex; gap: 7px; align-items: flex-start; }
  .notice[hidden] { display: none; }
  .notice svg { width: 14px; height: 14px; flex: none; margin-top: 1px; fill: none; stroke: var(--muted); stroke-width: 1.6; }

  .controls { display: flex; gap: 8px; margin-bottom: 12px; }
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .seg button {
    border: 0; background: transparent; color: var(--ink-2); font: inherit; font-size: 12.5px;
    padding: 6px 12px; cursor: pointer;
  }
  .seg button[aria-pressed="true"] { background: var(--series); color: #fff; }
  .filter-select {
    border: 1px solid var(--border); background: var(--surface); color: var(--ink-2);
    border-radius: 8px; padding: 6px 10px; font: inherit; font-size: 12.5px; cursor: pointer;
  }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: var(--muted); font-size: 11.5px; font-weight: 500; padding: 6px 8px; border-bottom: 1px solid var(--grid); }
  th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td { padding: 7px 8px; border-bottom: 1px solid var(--grid); vertical-align: middle; }
  tr:last-child td { border-bottom: 0; }
  tr:hover td { background: color-mix(in srgb, var(--series) 6%, transparent); }
  td.rank { color: var(--muted); width: 30px; font-variant-numeric: tabular-nums; }
  th.rank { width: 30px; }
  .who { display: flex; align-items: center; gap: 9px; min-width: 0; }
  .who img { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; background: var(--grid); flex: none; }
  .who .avatar-fallback { width: 26px; height: 26px; border-radius: 50%; background: var(--series-soft); color: var(--ink); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex: none; }
  .who a { color: var(--ink); text-decoration: none; font-weight: 550; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .who a:hover { text-decoration: underline; }
  .vlink { color: var(--ink); text-decoration: none; display: inline-block; max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom; }
  .vlink:hover { text-decoration: underline; }
  .chips { display: flex; gap: 4px; flex-wrap: wrap; }
  .chip { border: 1px solid var(--border); color: var(--ink-2); border-radius: 5px; font-size: 10.5px; padding: 1px 5px; white-space: nowrap; }
  .barcell { width: 40%; }
  /* grid: bar track flexes, value sits in its own right-aligned column so a
     huge number (e.g. 3.0M) never pushes the bar off the cell */
  .barrow { display: grid; grid-template-columns: 1fr 64px; align-items: center; gap: 10px; }
  .bartrack { width: 100%; }
  .bar { height: 10px; background: var(--series); border-radius: 0 4px 4px 0; min-width: 2px; }
  .barval { font-variant-numeric: tabular-nums; font-size: 13px; text-align: right; }
  td.dim, .dim { color: var(--muted); }
  #status { color: var(--muted); text-align: center; padding: 40px 0; }

  @media (max-width: 640px) {
    body { padding: 13px; }
    h1 { font-size: 16px; }
    .kpis { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .tile { padding: 12px 12px; }
    .tile .value { font-size: 21px; }
    .card { padding: 14px 12px; margin-bottom: 16px; }
    /* filters: let everything wrap so no control is pushed off-screen */
    .controls { flex-wrap: wrap; }
    .seg { flex-wrap: wrap; width: 100%; }
    .seg button { flex: 1 1 auto; padding: 7px 10px; }
    .filter-select { width: 100%; }
    /* platform rows: drop the fixed name/sub widths */
    .plat-row { grid-template-columns: 58px 1fr auto; gap: 8px; }
    .plat-sub { display: none; }
    /* tables: fixed layout so columns share the viewport instead of growing
       to content width (the source of the horizontal overflow) */
    table { table-layout: fixed; }
    th, td { padding: 6px 5px; font-size: 12.5px; }
    td.rank, th.rank { width: 24px; }
    .barcell { width: 44%; }
    .col-hide-sm { display: none; }
    .barrow { grid-template-columns: 1fr 46px; gap: 8px; }
    .who { gap: 7px; }
    .who img, .who .avatar-fallback { width: 22px; height: 22px; }
    .who a, .vlink { max-width: 100%; }
  }
  html, body { max-width: 100%; overflow-x: hidden; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>plzdontkillus spring-26 — social media views</h1>
    <div class="updated"><span class="dot"></span><span id="updated">loading…</span></div>
  </header>

  <div id="status">Fetching data…</div>

  <div id="content" hidden>
    <div class="kpis">
      <div class="tile"><div class="label">Social media views</div><div class="value" id="kpi-total"></div><div class="sub" id="kpi-total-sub"></div></div>
      <div class="tile"><div class="label">Videos tracked</div><div class="value" id="kpi-tracked"></div><div class="sub">of public posts</div></div>
      <div class="tile"><div class="label">Top creator</div><div class="value" id="kpi-leader" style="font-size:18px"></div><div class="sub" id="kpi-leader-sub"></div></div>
      <div class="tile"><div class="label">Strongest</div><div class="value" id="kpi-strong" style="font-size:18px"></div><div class="sub" id="kpi-strong-sub"></div></div>
      <div class="tile"><div class="label">Trending (24h)</div><div class="value" id="kpi-trend" style="font-size:18px"></div><div class="sub" id="kpi-trend-sub"></div></div>
    </div>

    <div class="card">
      <h2>Views by platform</h2>
      <div id="platforms"></div>
      <div class="notice" id="ig-notice" hidden>
        <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6.5"/><path d="M8 5v3.5M8 11h.01"/></svg>
        <span id="ig-notice-text"></span>
      </div>
    </div>

    <div class="card">
      <h2>Leaderboard</h2>
      <div class="controls">
        <div class="seg" role="group" aria-label="Range">
          <button id="btn-season" aria-pressed="true">Season</button>
          <button id="btn-momentum" aria-pressed="false">Last 24h</button>
          <button id="btn-ratio" aria-pressed="false">Per follower</button>
          <button id="btn-strong" aria-pressed="false">Strongest</button>
          <button id="btn-videos" aria-pressed="false">Top videos</button>
        </div>
        <select id="platform-filter" class="filter-select" aria-label="Platform">
          <option value="all">All platforms</option>
          <option value="youtube">YouTube</option>
          <option value="tiktok">TikTok</option>
          <option value="instagram">Instagram</option>
          <option value="x">X</option>
          <option value="facebook">Facebook</option>
        </select>
      </div>
      <table>
        <thead><tr id="head-row"></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
"use strict";
const POLL_MS = 300_000; // page checks for fresh data.json every 5 min
let DATA = null;
let range = "season"; // "season" | "momentum" | "ratio" | "strength"
let platformFilter = "all";

const $ = (id) => document.getElementById(id);
const fmt = (n) => n.toLocaleString("en-US");
const fmtCompact = (n) =>
  n >= 1e6 ? `${(n / 1e6).toFixed(1)}M`
  : n >= 1e4 ? `${Math.round(n / 1e3)}K`
  : n >= 1e3 ? `${(n / 1e3).toFixed(1)}K`
  : String(n);
const fmtRatio = (r) =>
  r >= 10 ? `${r.toFixed(0)}×` : r >= 1 ? `${r.toFixed(1)}×` : `${r.toFixed(2)}×`;

// short label for a bar value, by current mode; keeps labels narrow so a 3M
// video and a 300-view one both fit the same fixed value column
function barValueText(v) {
  if (range === "ratio") return fmtRatio(v);
  if (range === "strength") return fmt(Math.round(v));
  if (range === "momentum") return "+" + fmtCompact(v);
  return fmtCompact(v);
}

// bar as a % of the largest value currently shown, wrapped in a fixed track
function makeBarRow(value, max, exactLabel) {
  const barrow = document.createElement("div");
  barrow.className = "barrow";
  const track = document.createElement("div");
  track.className = "bartrack";
  const bar = document.createElement("div");
  bar.className = "bar";
  bar.style.width = `${Math.min(100, (value / max) * 100)}%`;
  track.append(bar);
  const val = document.createElement("span");
  val.className = "barval";
  val.textContent = barValueText(value);
  if (exactLabel != null) val.title = exactLabel;
  barrow.append(track, val);
  return barrow;
}
const PLATFORM_NAMES = {
  youtube: "YouTube", tiktok: "TikTok", instagram: "Instagram",
  x: "X", facebook: "Facebook", other: "Other",
};
const PLATFORM_ORDER = ["youtube", "tiktok", "instagram", "x", "facebook", "other"];

function postsOf(p) {
  return platformFilter === "all"
    ? p.posts
    : p.posts.filter((x) => x.platform === platformFilter);
}

function followersOf(p) {
  if (platformFilter === "all") return p.followers;
  return (p.followersByPlatform || {})[platformFilter] || null;
}

function personViews(p) {
  const posts = postsOf(p);
  const tracked = posts.filter((x) => x.videoViews != null);
  if (range === "momentum") {
    const withMom = posts.filter((x) => x.momentum != null);
    if (!withMom.length) return null;
    return withMom.reduce((s, x) => s + x.momentum, 0);
  }
  if (range === "ratio" || range === "strength") {
    const followers = followersOf(p);
    if (!followers || !tracked.length) return null;
    const views = tracked.reduce((s, x) => s + x.videoViews, 0);
    return range === "ratio"
      ? views / followers
      : views / Math.sqrt(Math.max(followers, 1000));
  }
  if (!tracked.length) return null;
  return tracked.reduce((s, x) => s + x.videoViews, 0);
}

function render() {
  if (!DATA) return;
  const people = DATA.people;
  const totalViews = people.reduce((s, p) => s + (p.totalVideoViews || 0), 0);
  const totals = DATA.platformTotals || {};
  const tracked = Object.values(totals).reduce((s, t) => s + t.tracked, 0);
  const publicPosts = Object.values(totals).reduce((s, t) => s + t.videos, 0);

  $("kpi-total").textContent = fmt(totalViews);
  $("kpi-total-sub").textContent = `across ${tracked} videos since ${DATA.seasonStart}`;
  $("kpi-tracked").textContent = `${tracked}/${publicPosts}`;
  const leader = [...people].sort((a, b) => (b.totalVideoViews || 0) - (a.totalVideoViews || 0))[0];
  $("kpi-leader").textContent = leader ? leader.name : "—";
  $("kpi-leader-sub").textContent = leader ? `${fmt(leader.totalVideoViews)} views` : "";
  const strong = [...people]
    .filter((p) => p.strength != null)
    .sort((a, b) => b.strength - a.strength)[0];
  $("kpi-strong").textContent = strong ? strong.name : "—";
  $("kpi-strong-sub").textContent = strong
    ? `${fmt(strong.totalVideoViews)} views at ${fmtRatio(strong.viewsPerFollower)} their audience`
    : "";
  const trend = [...people]
    .filter((p) => p.momentum24h != null)
    .sort((a, b) => b.momentum24h - a.momentum24h)[0];
  $("kpi-trend").textContent = trend ? trend.name : "—";
  $("kpi-trend-sub").textContent = trend
    ? `+${fmt(trend.momentum24h)} views in the last 24h`
    : "builds after 24h of tracking";

  renderPlatforms(totals);
  renderTable();

  const t = new Date(DATA.updatedAt);
  const secs = DATA.refreshSeconds || 0;
  const every = secs >= 86400 ? `${Math.round(secs / 86400)}d`
    : secs >= 3600 ? `${Math.round(secs / 3600)}h`
    : `${Math.round(secs / 60)}m`;
  $("updated").textContent =
    `updated ${t.toLocaleDateString()} ${t.toLocaleTimeString()} · scrapes every ${every}`;
  $("status").hidden = true;
  $("content").hidden = false;
}

function renderPlatforms(totals) {
  const host = $("platforms");
  host.replaceChildren();
  const entries = PLATFORM_ORDER.filter((k) => totals[k]).map((k) => [k, totals[k]]);
  const max = Math.max(1, ...entries.map(([, t]) => t.views));
  for (const [key, t] of entries) {
    const row = document.createElement("div");
    row.className = "plat-row";
    const name = document.createElement("div");
    name.className = "plat-name";
    name.textContent = PLATFORM_NAMES[key] || key;
    const barWrap = document.createElement("div");
    const bar = document.createElement("div");
    bar.className = "plat-bar";
    bar.style.width = `${(t.views / max) * 100}%`;
    barWrap.appendChild(bar);
    const views = document.createElement("div");
    views.className = "plat-views";
    views.textContent = t.tracked > 0 ? fmtCompact(t.views) : "—";
    if (t.tracked > 0) views.title = fmt(t.views) + " views";
    const sub = document.createElement("div");
    sub.className = "plat-sub";
    sub.textContent = `${t.tracked}/${t.videos} tracked`;
    row.append(name, barWrap, views, sub);
    host.appendChild(row);
  }
  const ig = totals.instagram;
  const igNeedsAuth = ig && ig.videos > 0 && ig.tracked < ig.videos && !DATA.instagramAuth;
  const secs = DATA.refreshSeconds || 86400;
  const cadence = secs >= 86400 ? `${Math.round(secs / 86400)}-day`
    : secs >= 3600 ? `${Math.round(secs / 3600)}-hour`
    : `${Math.round(secs / 60)}-minute`;
  $("ig-notice").hidden = false;
  $("ig-notice-text").textContent = igNeedsAuth
    ? "Instagram views need a logged-in session: log in to instagram.com in Zen and counts will appear on the next refresh."
    : `View counts are re-scraped on a ${cadence} cycle, so these figures reflect the latest daily pull rather than live numbers.`;
}

function avatarFor(p) {
  if (p.image) {
    const img = document.createElement("img");
    img.src = p.image;
    img.alt = "";
    img.loading = "lazy";
    img.referrerPolicy = "no-referrer";
    return img;
  }
  const fb = document.createElement("div");
  fb.className = "avatar-fallback";
  fb.textContent = (p.name || "?").slice(0, 1).toUpperCase();
  return fb;
}

function personLink(p) {
  const a = document.createElement("a");
  a.href = `https://portal.plzdontkillus.com/spring-26/${encodeURIComponent(p.slug)}`;
  a.target = "_blank";
  a.rel = "noopener";
  a.textContent = p.name;
  return a;
}

function setHeaders(cols) {
  const row = $("head-row");
  row.replaceChildren();
  for (const c of cols) {
    const th = document.createElement("th");
    if (c.cls) th.className = c.cls;
    th.textContent = c.label || "";
    row.appendChild(th);
  }
}

function renderVideoTable() {
  const rows = $("rows");
  setHeaders([
    { cls: "rank" }, { label: "Person" }, { label: "Video" },
    { label: "Platform", cls: "col-hide-sm" }, { label: "Views", cls: "barcell" },
  ]);
  const vids = [];
  for (const p of DATA.people) {
    for (const post of p.posts) {
      if (post.videoViews == null || !post.url) continue;
      if (platformFilter !== "all" && post.platform !== platformFilter) continue;
      vids.push({ p, post });
    }
  }
  vids.sort((a, b) => b.post.videoViews - a.post.videoViews);
  const top = vids.slice(0, 50);
  const max = Math.max(1, ...top.map((v) => v.post.videoViews));
  rows.replaceChildren();
  if (!top.length) {
    const tr = document.createElement("tr");
    const td = document.createElement("td");
    td.colSpan = 5;
    td.className = "dim";
    td.style.padding = "16px 8px";
    td.textContent = "no tracked videos for this platform";
    tr.append(td);
    rows.append(tr);
    return;
  }
  top.forEach(({ p, post }, i) => {
    const tr = document.createElement("tr");

    const rank = document.createElement("td");
    rank.className = "rank";
    rank.textContent = String(i + 1);
    tr.append(rank);

    const who = document.createElement("td");
    const wrap = document.createElement("div");
    wrap.className = "who";
    wrap.append(avatarFor(p), personLink(p));
    who.append(wrap);
    tr.append(who);

    const vid = document.createElement("td");
    const va = document.createElement("a");
    va.href = post.url;
    va.target = "_blank";
    va.rel = "noopener";
    va.className = "vlink";
    va.textContent = post.hidden ? "(hidden post)" : (post.title || "Untitled");
    vid.append(va);
    tr.append(vid);

    const plat = document.createElement("td");
    plat.className = "dim col-hide-sm";
    plat.textContent = PLATFORM_NAMES[post.platform] || post.platform;
    tr.append(plat);

    const bc = document.createElement("td");
    bc.className = "barcell";
    bc.append(makeBarRow(post.videoViews, max, fmt(post.videoViews) + " views"));
    tr.append(bc);

    rows.append(tr);
  });
}

function renderTable() {
  if (!DATA) return;
  if (range === "videos") return renderVideoTable();
  const rows = $("rows");
  const viewsLabel =
    range === "ratio" ? "Views per follower"
    : range === "strength" ? "Strength (views ÷ √followers)"
    : range === "momentum" ? "Views gained (last 24h)"
    : "Views";
  setHeaders([
    { cls: "rank" }, { label: "Person" }, { label: "Platforms", cls: "col-hide-sm" },
    { label: viewsLabel, cls: "barcell" },
    { label: "Followers", cls: "num col-hide-sm" },
    { label: "Tracked", cls: "num col-hide-sm" },
  ]);
  const sorted = [...DATA.people].sort(
    (a, b) => (personViews(b) ?? -1) - (personViews(a) ?? -1) || a.slug.localeCompare(b.slug)
  );
  const max = Math.max(1, ...sorted.map((p) => personViews(p) ?? 0));
  rows.replaceChildren();
  sorted.forEach((p, i) => {
    const views = personViews(p);
    const tr = document.createElement("tr");

    const rank = document.createElement("td");
    rank.className = "rank";
    rank.textContent = views == null ? "" : String(i + 1);
    tr.appendChild(rank);

    const who = document.createElement("td");
    const wrap = document.createElement("div");
    wrap.className = "who";
    if (p.image) {
      const img = document.createElement("img");
      img.src = p.image;
      img.alt = "";
      img.loading = "lazy";
      img.referrerPolicy = "no-referrer";
      wrap.appendChild(img);
    } else {
      const fb = document.createElement("div");
      fb.className = "avatar-fallback";
      fb.textContent = p.name.slice(0, 1).toUpperCase();
      wrap.appendChild(fb);
    }
    const a = document.createElement("a");
    a.href = `https://portal.plzdontkillus.com/spring-26/${encodeURIComponent(p.slug)}`;
    a.target = "_blank";
    a.rel = "noopener";
    a.textContent = p.name;
    wrap.appendChild(a);
    who.appendChild(wrap);
    tr.appendChild(who);

    const plats = document.createElement("td");
    plats.className = "col-hide-sm";
    const chips = document.createElement("div");
    chips.className = "chips";
    const fPosts = postsOf(p);
    const postsToUse = fPosts;
    const counts = {};
    for (const post of postsToUse) {
      if (post.platform) counts[post.platform] = (counts[post.platform] || 0) + 1;
    }
    for (const key of PLATFORM_ORDER) {
      if (!counts[key]) continue;
      const chip = document.createElement("span");
      chip.className = "chip";
      chip.textContent = counts[key] > 1
        ? `${PLATFORM_NAMES[key]} ×${counts[key]}`
        : PLATFORM_NAMES[key];
      chips.appendChild(chip);
    }
    plats.appendChild(chips);
    tr.appendChild(plats);

    const filterName = platformFilter === "all" ? "" : `${PLATFORM_NAMES[platformFilter]} `;
    const barcell = document.createElement("td");
    barcell.className = "barcell";
    if (views == null) {
      barcell.classList.add("dim");
      const hasTracked = fPosts.some((x) => x.videoViews != null);
      if (range === "momentum") {
        barcell.textContent = hasTracked
          ? "accumulating"
          : `no trackable ${filterName}videos`;
      } else if (range === "ratio" || range === "strength") {
        barcell.textContent = hasTracked
          ? "followers unknown"
          : `no trackable ${filterName}videos`;
      } else {
        barcell.textContent = fPosts.length > 0
          ? "no trackable videos"
          : `no ${filterName}posts`;
      }
    } else {
      const exact = range === "ratio" || range === "strength" ? null
        : (range === "momentum" ? "+" + fmt(views) + " views (24h)" : fmt(views) + " views");
      barcell.appendChild(makeBarRow(views, max, exact));
      const latest = fPosts[fPosts.length - 1];
      if (latest) barcell.title = latest.hidden ? "(hidden post)" : latest.title;
    }
    tr.appendChild(barcell);

    const fol = document.createElement("td");
    fol.className = "num col-hide-sm";
    const followers = followersOf(p);
    if (followers) {
      const partial = platformFilter === "all" && p.followersPartial;
      fol.textContent = fmtCompact(followers) + (partial ? "+" : "");
      if (partial) fol.title = "some of their platforms don't expose follower counts";
    } else {
      fol.textContent = "—";
      fol.classList.add("dim");
    }
    tr.appendChild(fol);

    const trk = document.createElement("td");
    trk.className = "num dim col-hide-sm";
    trk.textContent = fPosts.length
      ? `${fPosts.filter((x) => x.videoViews != null).length}/${fPosts.length}`
      : "—";
    tr.appendChild(trk);

    rows.appendChild(tr);
  });
}

async function load() {
  try {
    const resp = await fetch("data.json", { cache: "no-store" });
    if (!resp.ok) throw new Error(resp.status);
    DATA = await resp.json();
    render();
  } catch (e) {
    if (!DATA) $("status").textContent = "Waiting for first scrape…";
  }
}

$("btn-season").addEventListener("click", () => setRange("season"));
$("btn-momentum").addEventListener("click", () => setRange("momentum"));
$("btn-ratio").addEventListener("click", () => setRange("ratio"));
$("btn-strong").addEventListener("click", () => setRange("strength"));
$("btn-videos").addEventListener("click", () => setRange("videos"));
$("platform-filter").addEventListener("change", (e) => {
  platformFilter = e.target.value;
  renderTable();
});
function setRange(r) {
  range = r;
  $("btn-season").setAttribute("aria-pressed", String(r === "season"));
  $("btn-momentum").setAttribute("aria-pressed", String(r === "momentum"));
  $("btn-ratio").setAttribute("aria-pressed", String(r === "ratio"));
  $("btn-strong").setAttribute("aria-pressed", String(r === "strength"));
  $("btn-videos").setAttribute("aria-pressed", String(r === "videos"));
  renderTable();
}

const initView = new URLSearchParams(location.search).get("view");
if (["season", "momentum", "ratio", "strength", "videos"].includes(initView)) {
  setRange(initView);
}

load();
setInterval(load, POLL_MS);
</script>
</body>
</html>
